name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. SSH into EC2 and deploy using docker compose
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3  
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # If repo doesn't exist on EC2, clone it — otherwise just pull latest
            if [ -d ~/calculator ]; then
              cd ~/calculator && git pull origin main
            else
              git clone https://github.com/${{ secrets.GH_REPO }}.git ~/calculator
              cd ~/calculator
            fi

            # Build image fresh and start container
            docker compose down
            docker compose up -d --build
            docker image prune -f
